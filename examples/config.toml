# Talon example configuration — Karpathy LLM Wiki preset.
#
# Designed to be usable as-is against the bundled `examples/calle-sur-vault/`.
# Copy to `~/.config/talon/config.toml` and adjust as needed:
#   - `vault_path`         — point at your real Obsidian vault when ready
#   - `db_path`            — pick a stable home; default below writes alongside the vault
#   - `inference.base_url` — point at your TEI-compatible endpoint
#   - `expansion.base_url` — point at your OpenAI-compatible chat endpoint
#
# See docs/CONFIG.md for the full reference.

# Relative paths in this file are resolved against the config file's
# directory (i.e. `examples/`), not CWD.
vault_path = "calle-sur-vault"
db_path = "calle-sur-vault/.talon/calle-sur.db"

include_patterns = ["**/*.md"]
ignore_patterns = [".obsidian/**", ".git/**", "templates/**", "*.canvas"]

[indexer]
chunk_tokens = 512
chunk_overlap = 64
chunk_min_tokens = 16

# Inference endpoint. Anything TEI-compatible (text-embeddings-inference,
# Infinity, ultraclaw's local sidecar) works. Adjust base_url to taste.
[inference]
base_url = "http://host.docker.internal:8000"

[inference.models]
query_embedding = "embed"
document_embedding = "embed"
chunk_embedding = "embed_chunked"
reranker = "rerank"

[inference.rerank]
# Expected response: [{ index, score }] for every input text, sorted descending.
# Scores are normalized relevance values in [0, 1]. Set score_scale = "logits"
# only for endpoints that return raw cross-encoder logits.
score_scale = "normalized"
# "minimal" sends { query, texts, return_text }. "tei" also sends
# { raw_scores, truncate } for full Text Embeddings Inference compatibility.
request_shape = "minimal"
truncate = true

# Query-expansion endpoint. OpenAI-compatible chat completions.
[expansion]
provider = "openai-compatible"
base_url = "http://host.docker.internal:8000/v1"
model = "bonsai"
# Optional total completion cap. Leave unset for thinking models.
# max_tokens = 768

# ── Scopes ─────────────────────────────────────────────────────────────────
# Karpathy LLM-Wiki preset. Rationale per directory:
#   wiki/      compiled, agent-curated knowledge — top signal
#   projects/  active workspaces — strong signal
#   artifacts/ agent outputs for the user — neutral
#   daily/     ephemeral; only useful when the user asks about a date or
#              when the agent is processing today's note
#   raw/       source material the agent hasn't compiled yet — useful but noisy
#   archive/   completed/stale — deprioritised heavily
#   private/   sensitive — never auto-searched, only via explicit --scope private
#   _meta/     vault infrastructure — only via --scope meta
#
# Three knobs per scope:
#   priority   scope label for filtering, lint behavior, and ranking
#              weights. Positive boosts are gated by relevance so weak high-
#              priority hits do not shout over stronger matches.
#              Defaults: boosted=1.2, elevated=1.1, normal=1.0,
#              muted=0.85, buried=0.5.
#   default    if false, the scope is excluded from default queries entirely
#              (not just down-ranked); re-include via --scope NAME or --scope-all
#   lint       if false, files in this scope don't appear in `talon lint`
#              findings — but stay indexed and continue to satisfy link-target
#              resolution. Useful for ephemeral/closed/sensitive areas.
#
# Iteration follows TOML declaration order — narrower or more sensitive
# scopes declared above broader ones win when their globs overlap.

[scopes.wiki]
glob = ["wiki/**"]
priority = "boosted"
default = true
lint = true

[scopes.projects]
glob = ["projects/**"]
priority = "elevated"
default = true
lint = true

[scopes.artifacts]
glob = ["artifacts/**"]
priority = "elevated"
default = true
lint = true

[scopes.daily]
glob = ["daily/**"]
priority = "muted"
default = false
lint = false        # daily notes are written-from, not written-to

[scopes.raw]
glob = ["raw/**"]
priority = "muted"
default = false
lint = true         # raw clips can have broken links worth catching

[scopes.archive]
glob = ["archive/**"]
priority = "buried"
default = false
lint = false        # closed projects don't need ongoing curation

[scopes.private]
glob = ["private/**"]
priority = "buried"
default = false
lint = false

[scopes.meta]
glob = ["_meta/**"]
priority = "buried"
default = false
lint = false

# ── Lint global ignore ─────────────────────────────────────────────────────
# Globs of paths to skip when reporting lint findings. Takes precedence over
# per-scope `lint = true`. Excluded paths remain indexed and link-resolvable.
[lint]
ignore = ["**/_drafts/**", "**/scratch.md"]
