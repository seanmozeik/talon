# Talon example configuration — Karpathy LLM Wiki preset.
#
# Designed to be usable as-is against the bundled `examples/calle-sur-vault/`.
# Copy to `~/.config/talon/config.toml` and adjust as needed:
#   - `vault_path`         — point at your real Obsidian vault when ready
#   - `db_path`            — pick a stable home; default below writes alongside the vault
#   - `embedding.base_url` — point at your TEI-compatible endpoint
#   - `chat.expansion.base_url` — point at your OpenAI-compatible chat endpoint
#
# See docs/CONFIG.md for the full reference.

# Relative paths in this file are resolved against the config file's
# directory (i.e. `examples/`), not CWD.
vault_path = "calle-sur-vault"
db_path = "calle-sur-vault/.talon/calle-sur.db"

include_patterns = ["**/*.md"]
ignore_patterns = [".obsidian/**", ".git/**", "templates/**", "*.canvas"]

[indexer]
chunk_tokens = 512
chunk_overlap = 64
chunk_min_tokens = 16

[search]
candidate_limit = 60
limit = 10
cache_size = 200
rerank_cache_size = 2000
rerank_batch_size = 4
rerank_max_tokens = 128

[embedding]
base_url = "http://localhost:8000"
adapter = "tei"
model = "embed"
document_model = "embed_chunked"
context_tokens = 512

[rerank]
base_url = "http://localhost:8000"
adapter = "minimal"
model = "rerank"
score_scale = "normalized"
truncate = true

[chat.expansion]
base_url = "http://localhost:8000/v1"
model = "bonsai"
context_tokens = 16000
max_output_tokens = 768

[chat.ask]
model = "qwen-smol"
context_tokens = 65536
max_output_tokens = 2048
planning_reasoning_effort = "none"
synthesis_reasoning_effort = "medium"

[mcp.hooks]
recall_deadline_ms = 45000

# ── Scopes ─────────────────────────────────────────────────────────────────
# Karpathy LLM-Wiki preset. Rationale per directory:
#   wiki/      compiled, agent-curated knowledge — top signal
#   projects/  active workspaces — strong signal
#   artifacts/ agent outputs for the user — neutral
#   daily/     ephemeral; only useful when the user asks about a date or
#              when the agent is processing today's note
#   raw/       source material the agent hasn't compiled yet — useful but noisy
#   archive/   completed/stale — deprioritised heavily
#   private/   sensitive — never auto-searched, only via explicit --scope private
#   _meta/     vault infrastructure — only via --scope meta
#
# Three knobs per scope:
#   priority   scope label for filtering, inspect behavior, and ranking
#              weights. Positive boosts are gated by relevance so weak high-
#              priority hits do not shout over stronger matches.
#              Defaults: boosted=1.2, elevated=1.1, normal=1.0,
#              muted=0.85, buried=0.5.
#   default    if false, the scope is excluded from default queries entirely
#              (not just down-ranked); re-include via --scope NAME or --scope-all
#   lint       if false, files in this scope don't appear in `talon inspect`
#              findings — but stay indexed and continue to satisfy link-target
#              resolution. Useful for ephemeral/closed/sensitive areas.
#
# Iteration follows TOML declaration order — narrower or more sensitive
# scopes declared above broader ones win when their globs overlap.

[scopes.wiki]
glob = ["wiki/**"]
priority = "boosted"
default = true
inspect = true

[scopes.projects]
glob = ["projects/**"]
priority = "elevated"
default = true
inspect = true

[scopes.artifacts]
glob = ["artifacts/**"]
priority = "elevated"
default = true
inspect = true

[scopes.daily]
glob = ["daily/**"]
priority = "muted"
default = false
inspect = false     # daily notes are written-from, not written-to

[scopes.raw]
glob = ["raw/**"]
priority = "muted"
default = false
inspect = true     # raw clips can have broken links worth catching

[scopes.archive]
glob = ["archive/**"]
priority = "buried"
default = false
inspect = false       # closed projects don't need ongoing curation

[scopes.private]
glob = ["private/**"]
priority = "buried"
default = false
inspect = false

[scopes.meta]
glob = ["_meta/**"]
priority = "buried"
default = false
inspect = false

# ── Lint global ignore ─────────────────────────────────────────────────────
# Globs of paths to skip when reporting inspect findings. Takes precedence over
# per-scope `inspect = true`. Excluded paths remain indexed and link-resolvable.
[inspect]
ignore = ["**/_drafts/**", "**/scratch.md"]
