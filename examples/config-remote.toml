# Talon remote configuration — OpenRouter endpoints.
#
# All AI capabilities (embeddings, reranking, query expansion, ask) route
# through OpenRouter with a single API key. No local sidecar required.
#
# Setup:
#   1. Get an API key at openrouter.ai
#   2. Store it: talon secrets set openrouter <your-key>
#   3. Copy this file: cp examples/config-remote.toml ~/.config/talon/config.toml
#   4. Set vault_path and db_path below
#   5. talon sync
#
# Model choices (May 2026):
#   embedding   google/gemini-embedding-2-preview   $0.20/M tokens, 8K ctx, 3072-dim
#   rerank      cohere/rerank-4-pro                 $0.0025/search, 33K ctx, best quality
#   expansion   google/gemma-4-26b-a4b-it           cheap, fast, strong instruction following
#   ask         deepseek/deepseek-v4-flash          strong reasoning, low cost

vault_path = "/path/to/your/obsidian/vault"
db_path    = "~/.local/share/talon/index.sqlite"

include_patterns = ["**/*.md"]
ignore_patterns  = [".obsidian/**", ".git/**", "templates/**", "*.canvas"]

# ── Credentials ────────────────────────────────────────────────────────────
# Store your key with: talon secrets set openrouter <key>
# Or set the env var:  export OPENROUTER_API_KEY=<key>

[credentials.openrouter]
api_key_env = "OPENROUTER_API_KEY"

# ── Indexer ─────────────────────────────────────────────────────────────────

[indexer]
chunk_tokens     = 512
chunk_overlap    = 64
chunk_min_tokens = 16

# ── Search ───────────────────────────────────────────────────────────────────

[search]
candidate_limit   = 60
limit             = 10
cache_size        = 200
rerank_cache_size = 2000
rerank_batch_size = 8
rerank_max_tokens = 512

# ── Embedding ────────────────────────────────────────────────────────────────
# OpenRouter exposes OpenAI-compatible /v1/embeddings.
# gemini-embedding-2-preview: Google's multimodal embedding model, 8K context,
# up to 3072 dimensions. Released April 2026.

[embedding]
base_url       = "https://openrouter.ai/api/v1"
adapter        = "openai"
model          = "google/gemini-embedding-2-preview"
context_tokens = 8192
credential     = "openrouter"

# ── Reranking ────────────────────────────────────────────────────────────────
# OpenRouter /v1/rerank uses Cohere's wire format.
# cohere/rerank-4-pro: 33K context, 100+ languages, $0.0025/search. Released April 2026.
# Downgrade to cohere/rerank-4-fast if latency matters more than quality.

[rerank]
base_url   = "https://openrouter.ai/api/v1"
adapter    = "cohere"
model      = "cohere/rerank-4-pro"
credential = "openrouter"

# ── Chat: query expansion ────────────────────────────────────────────────────
# Short task: input ~500 tokens, output ~100 tokens. Runs on every search.
# gemma-4-26b-a4b-it: Google's MoE Gemma 4 variant, fast and cheap for
# short instruction-following tasks.

[chat.expansion]
base_url          = "https://openrouter.ai/api/v1"
model             = "google/gemma-4-26b-a4b-it"
context_tokens    = 4096
max_output_tokens = 256
credential        = "openrouter"

# ── Chat: ask ────────────────────────────────────────────────────────────────
# Used for talon ask synthesis — needs strong multi-document reasoning.
# deepseek/deepseek-v4-flash: fast, strong reasoning, low cost.

[chat.ask]
model                      = "deepseek/deepseek-v4-flash"
context_tokens             = 65536
max_output_tokens          = 2048
planning_reasoning_effort  = "none"
synthesis_reasoning_effort = "medium"
credential                 = "openrouter"

[mcp.hooks]
recall_deadline_ms = 45000

# ── Scopes ───────────────────────────────────────────────────────────────────
# Karpathy LLM-Wiki preset. Adjust to match your vault layout.

[scopes.wiki]
glob     = ["wiki/**"]
priority = "boosted"
default  = true
inspect  = true

[scopes.projects]
glob     = ["projects/**"]
priority = "elevated"
default  = true
inspect  = true

[scopes.artifacts]
glob     = ["artifacts/**"]
priority = "elevated"
default  = true
inspect  = true

[scopes.daily]
glob     = ["daily/**"]
priority = "muted"
default  = false
inspect  = false

[scopes.raw]
glob     = ["raw/**"]
priority = "muted"
default  = false
inspect  = true

[scopes.archive]
glob     = ["archive/**"]
priority = "buried"
default  = false
inspect  = false

[scopes.private]
glob     = ["private/**"]
priority = "buried"
default  = false
inspect  = false

[scopes.meta]
glob     = ["_meta/**"]
priority = "buried"
default  = false
inspect  = false

[inspect]
ignore = ["**/_drafts/**", "**/scratch.md"]
